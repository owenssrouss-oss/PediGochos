<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creador de Menú Interactivo - PediGochos Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/menu-builder.css">
</head>
<body>

  <!-- Page Header -->
  <header class="page-header">
    <div class="brand-title">PediGochos<span>Flow</span></div>
    <div>
      <button class="btn-neumorphic" onclick="openMenuModal()">
        <span>➕</span> Nuevo Producto
      </button>
      <a href="/admin.html" class="btn-neumorphic" style="text-decoration: none; margin-left: 12px;">
        <span>👑</span> Panel Admin
      </a>
    </div>
  </header>

  <!-- Main Container -->
  <main class="menu-container">
    
    <!-- Sidebar Panel: Categories -->
    <aside class="sidebar-panel">
      <div class="section-title">
        <span>📁 Categorías</span>
        <button onclick="promptCreateCategory()" style="background:none; border:none; color:var(--accent); font-size:18px; cursor:pointer;">➕</button>
      </div>
      <ul class="category-list" id="categories-sidebar">
        <!-- Loaded dynamically -->
        <li class="category-item active" onclick="filterCategory('all')">Todos los Productos</li>
      </ul>
    </aside>

    <!-- Catalog View Panel -->
    <section class="catalog-panel">
      <div class="section-title">📦 Catálogo de Productos</div>
      <div class="catalog-grid" id="products-catalog-grid">
        <!-- Loaded dynamically via DB or Supabase Realtime -->
        <div class="cart-empty-state" style="grid-column: 1 / -1; background: var(--bg-card); padding: 50px; border-radius: 20px; text-align: center; border: 1px dashed var(--border-light);">
          <span style="font-size: 40px;">🍔</span>
          <p style="margin-top: 12px; color: var(--text-muted);">No hay productos registrados en Supabase. ¡Agrega el primero!</p>
        </div>
      </div>
    </section>

  </main>

  <!-- Glassmorphic Modal: Create Product -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>🍔 Agregar Producto al Menú</h3>
        <button class="modal-close" onclick="closeMenuModal()">✕</button>
      </div>
      
      <form id="product-form" onsubmit="handleProductSubmit(event)">
        
        <!-- Category Selector -->
        <div class="form-group">
          <label for="form-category">Categoría *</label>
          <select id="form-category" required>
            <option value="">-- Selecciona una categoría --</option>
            <!-- Loaded dynamically -->
          </select>
        </div>

        <!-- Product Name -->
        <div class="form-group">
          <label for="form-name">Nombre del Producto *</label>
          <input type="text" id="form-name" required placeholder="Ej. Pepito Mixto Especial">
        </div>

        <!-- Description -->
        <div class="form-group">
          <label for="form-desc">Descripción / Ingredientes *</label>
          <textarea id="form-desc" rows="3" required placeholder="Ej. Carne de res, pollo, aguacate, queso cheddar en pan baguette."></textarea>
        </div>

        <!-- Base Price -->
        <div class="form-group">
          <label for="form-price">Precio Base ($ USD) *</label>
          <input type="number" id="form-price" step="0.01" min="0" required placeholder="Ej. 12.50">
        </div>

        <!-- Image Upload -->
        <div class="form-group">
          <label for="form-image">Imagen del Producto *</label>
          <input type="file" id="form-image" accept="image/*" required>
        </div>

        <!-- Submit Button -->
        <div style="margin-top: 24px; display: flex; justify-content: flex-end; gap: 12px;">
          <button type="button" class="btn-neumorphic" onclick="closeMenuModal()" style="box-shadow: none;">Cancelar</button>
          <button type="submit" id="btn-submit-form" class="btn-neumorphic" style="background-color: var(--accent); color: #121216; border-color: var(--accent);">
            <span>Guardar Producto</span>
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- Toast Notification Center -->
  <div class="toast-container" id="toast-center"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-helper.js"></script>
  <script src="/js/menu-builder.js"></script>
  
  <script>
    let activeCategoryId = 'all';
    let categoriesList = [];
    let productsList = [];

    // Initialize Page
    document.addEventListener('DOMContentLoaded', async () => {
      // Connect Supabase
      const ok = await MenuBuilder.init();
      if (!ok) {
        showToast('Supabase no está configurado localmente. Revisa tu .env', true);
        return;
      }
      
      // Load UI Lists
      await loadCategories();
      await loadProducts();

      // Subscribe to real-time sync WebSocket updates!
      MenuBuilder.subscribeToMenuUpdates(
        (newProd) => {
          showToast(`¡Nuevo producto "${newProd.name}" sincronizado en vivo! 🚀`);
          handleRealtimeInsert(newProd);
        },
        (updatedProd) => {
          showToast(`Producto "${updatedProd.name}" actualizado en vivo! 🔄`);
          handleRealtimeUpdate(updatedProd);
        },
        (deletedProd) => {
          showToast(`Un producto fue eliminado del menú 🗑️`, true);
          handleRealtimeDelete(deletedProd);
        }
      );
    });

    // ==========================================
    // UI LOADING & DATA FETCHING
    // ==========================================

    async function loadCategories() {
      try {
        categoriesList = await MenuBuilder.getCategories();
        renderCategories();
      } catch (err) {
        console.error(err);
        showToast('Error cargando categorías de Supabase', true);
      }
    }

    async function loadProducts() {
      try {
        // Query products from Supabase directly
        const { data, error } = await MenuBuilder.supabase
          .from('products')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;
        productsList = data || [];
        renderProducts();
      } catch (err) {
        console.error(err);
        showToast('Error cargando el catálogo', true);
      }
    }

    function renderCategories() {
      const sidebar = document.getElementById('categories-sidebar');
      const select = document.getElementById('form-category');
      
      sidebar.innerHTML = `<li class="category-item ${activeCategoryId === 'all' ? 'active' : ''}" onclick="filterCategory('all')">Todos los Productos</li>`;
      select.innerHTML = `<option value="">-- Selecciona una categoría --</option>`;

      categoriesList.forEach(cat => {
        // Add to sidebar
        const li = document.createElement('li');
        li.className = `category-item ${activeCategoryId === cat.id ? 'active' : ''}`;
        li.innerText = cat.name;
        li.onclick = () => filterCategory(cat.id);
        sidebar.appendChild(li);

        // Add to form select dropdown
        const opt = document.createElement('option');
        opt.value = cat.id;
        opt.innerText = cat.name;
        select.appendChild(opt);
      });
    }

    function renderProducts() {
      const grid = document.getElementById('products-catalog-grid');
      grid.innerHTML = '';

      const filtered = activeCategoryId === 'all' 
        ? productsList 
        : productsList.filter(p => p.category_id === activeCategoryId);

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="cart-empty-state" style="grid-column: 1 / -1; background: var(--bg-card); padding: 50px; border-radius: 20px; text-align: center; border: 1px dashed var(--border-light);">
            <span style="font-size: 40px;">📦</span>
            <p style="margin-top: 12px; color: var(--text-muted);">No hay productos en esta categoría.</p>
          </div>
        `;
        return;
      }

      filtered.forEach(prod => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.id = `prod-card-${prod.id}`;
        
        // Check if image exists, otherwise fallback
        const imgUrl = prod.image_url || '/images/burger_royale.jpg';
        
        card.innerHTML = `
          <img src="${imgUrl}" alt="${prod.name}" class="product-img" onerror="this.src='/images/burger_royale.jpg'">
          <div class="product-info">
            <h4>${prod.name}</h4>
            <p>${prod.description || 'Sin descripción.'}</p>
          </div>
          <div class="product-footer">
            <span class="product-price">$${parseFloat(prod.price).toFixed(2)}</span>
            <span style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">
              ${getCategoryName(prod.category_id)}
            </span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function getCategoryName(catId) {
      const cat = categoriesList.find(c => c.id === catId);
      return cat ? cat.name : 'Varios';
    }

    function filterCategory(catId) {
      activeCategoryId = catId;
      document.querySelectorAll('.category-item').forEach(item => {
        item.classList.remove('active');
      });
      renderCategories();
      renderProducts();
    }

    // ==========================================
    // ACTION CONTROLLERS & REALTIME SYNC HANDLERS
    // ==========================================

    function openMenuModal() {
      document.getElementById('product-modal').classList.add('active');
    }

    function closeMenuModal() {
      document.getElementById('product-modal').classList.remove('active');
      document.getElementById('product-form').reset();
    }

    async function promptCreateCategory() {
      const name = prompt('Ingresa el nombre de la nueva categoría (ej. Pepitos, Bebidas):');
      if (!name) return;
      const slug = name.toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '');
      
      try {
        await MenuBuilder.createCategory(name, slug);
        showToast(`Categoría "${name}" creada con éxito!`);
        await loadCategories();
      } catch (err) {
        showToast('Error al crear categoría: ' + err.message, true);
      }
    }

    // PILLAR 4: STATE MANAGEMENT & ERROR FLOWS IN THE UI
    async function handleProductSubmit(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('btn-submit-form');
      const catSelect = document.getElementById('form-category').value;
      const nameInput = document.getElementById('form-name').value;
      const descInput = document.getElementById('form-desc').value;
      const priceInput = document.getElementById('form-price').value;
      const fileInput = document.getElementById('form-image').files[0];

      if (!fileInput) {
        showToast('Por favor, selecciona una foto del producto.', true);
        return;
      }

      // 1. Enter Loading State (Heartbeat effect & disable inputs)
      submitBtn.disabled = true;
      submitBtn.classList.add('heartbeat-pulse');
      submitBtn.innerHTML = `<span class="spinner"></span> <span style="margin-left: 8px;">Subiendo Imagen...</span>`;

      try {
        // 2. Upload image to Supabase Storage (automatic client-side compression)
        const imageUrl = await MenuBuilder.uploadProductImage(fileInput);
        
        // Update loading text
        submitBtn.innerHTML = `<span class="spinner"></span> <span style="margin-left: 8px;">Guardando Producto...</span>`;
        
        // 3. Insert Product entry into PostgreSQL Database
        const newProduct = await MenuBuilder.createProduct(catSelect, nameInput, descInput, priceInput, imageUrl);
        
        // 4. Success flow: close modal smoothly & trigger Toast
        closeMenuModal();
        showToast(`🎉 ¡${newProduct.name} agregado al menú con éxito!`);
        
      } catch (err) {
        // 5. Error Flow: Modal remains open, data intact, show Toast alert
        console.error(err);
        showToast(`❌ Error: ${err.message || 'Problema de red. Intenta nuevamente.'}`, true);
      } finally {
        // 6. Reset submit button state
        submitBtn.disabled = false;
        submitBtn.classList.remove('heartbeat-pulse');
        submitBtn.innerHTML = `<span>Guardar Producto</span>`;
      }
    }

    // REALTIME WS SYNC HANDLERS (Optimistic & Dynamic UI Updates)
    function handleRealtimeInsert(newProd) {
      // Avoid duplicate insertion if this client created it
      if (productsList.some(p => p.id === newProd.id)) return;
      
      productsList.unshift(newProd);
      renderProducts();
      
      // Highlight the newly synchronized product card
      const card = document.getElementById(`prod-card-${newProd.id}`);
      if (card) {
        const badge = document.createElement('div');
        badge.className = 'new-indicator';
        badge.innerText = 'NUEVO';
        card.appendChild(badge);
        
        // Fade out indicator after 5 seconds
        setTimeout(() => {
          badge.remove();
        }, 5000);
      }
    }

    function handleRealtimeUpdate(updatedProd) {
      const idx = productsList.findIndex(p => p.id === updatedProd.id);
      if (idx !== -1) {
        productsList[idx] = updatedProd;
        renderProducts();
      }
    }

    function handleRealtimeDelete(deletedProd) {
      productsList = productsList.filter(p => p.id !== deletedProd.id);
      renderProducts();
    }

    // Toast Utility
    function showToast(message, isError = false) {
      const container = document.getElementById('toast-center');
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.innerHTML = `
        <span>${isError ? '⚠️' : '⚡'}</span>
        <p>${message}</p>
      `;
      container.appendChild(toast);
      
      // Auto remove after 4 seconds
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1) reverse forwards';
        setTimeout(() => {
          toast.remove();
        }, 300);
      }, 4000);
    }
  </script>
</body>
</html>
